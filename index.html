<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #060d0a;
      --surface: #0e1a14;
      --green-deep: #0b3d24;
      --green-mid: #1a6b3f;
      --green-bright: #22c55e;
      --green-glow: #4ade80;
      --text-primary: #f0faf4;
      --text-secondary: #7aad8e;
      --text-muted: #3d6b50;
      --border: rgba(34, 197, 94, 0.12);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(34, 197, 94, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(11, 61, 36, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 40% 60% at 10% 60%, rgba(26, 107, 63, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Dot grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(34, 197, 94, 0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 80%);
    }

    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 72px 64px 64px;
      max-width: 480px;
      width: calc(100% - 48px);
      background: linear-gradient(145deg, rgba(14, 26, 20, 0.9), rgba(6, 13, 10, 0.95));
      border: 1px solid var(--border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(34, 197, 94, 0.05),
        0 32px 80px rgba(0, 0, 0, 0.6),
        0 0 120px rgba(34, 197, 94, 0.04) inset;
      animation: card-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Checkmark ring */
    .check-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      margin-bottom: 36px;
    }

    .check-ring {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(74, 222, 128, 0.15), rgba(34, 197, 94, 0.04));
      border: 1.5px solid rgba(34, 197, 94, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: ring-pulse 3s ease-in-out 0.8s infinite;
    }

    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.2), 0 0 24px rgba(34, 197, 94, 0.06); }
      50%       { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0), 0 0 40px rgba(34, 197, 94, 0.12); }
    }

    /* SVG checkmark draw-on */
    .check-svg {
      width: 36px;
      height: 36px;
      overflow: visible;
    }

    .check-path {
      fill: none;
      stroke: var(--green-bright);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.8));
      animation: draw-check 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
    }

    @keyframes draw-check {
      to { stroke-dashoffset: 0; }
    }

    /* Orbiting dot */
    .orbit {
      position: absolute;
      inset: -12px;
      animation: orbit-spin 6s linear infinite;
    }

    .orbit-dot {
      position: absolute;
      top: 0;
      left: 50%;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-glow);
      transform: translateX(-50%);
      box-shadow: 0 0 8px var(--green-bright);
      opacity: 0;
      animation: orbit-dot-in 0.4s ease 1s forwards;
    }

    @keyframes orbit-spin {
      to { transform: rotate(360deg); }
    }

    @keyframes orbit-dot-in {
      to { opacity: 1; }
    }

    /* Typography */
    .headline {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 42px;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 14px;
      opacity: 0;
      animation: text-in 0.6s ease 0.5s forwards;
    }

    .headline em {
      font-style: italic;
      color: var(--green-glow);
    }

    .subtitle {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 300px;
      opacity: 0;
      animation: text-in 0.6s ease 0.65s forwards;
    }

    @keyframes text-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--green-mid), transparent);
      margin: 28px auto;
      opacity: 0;
      animation: text-in 0.5s ease 0.8s forwards;
    }

    /* Meta row */
    .meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      animation: text-in 0.5s ease 0.9s forwards;
    }

    .meta-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green-mid);
      animation: dot-blink 2s ease-in-out 1.2s infinite;
    }

    @keyframes dot-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* Corner accents */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      opacity: 0.25;
    }
    .corner--tl { top: 16px; left: 16px; border-top: 1px solid var(--green-bright); border-left: 1px solid var(--green-bright); }
    .corner--tr { top: 16px; right: 16px; border-top: 1px solid var(--green-bright); border-right: 1px solid var(--green-bright); }
    .corner--bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--green-bright); border-left: 1px solid var(--green-bright); }
    .corner--br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--green-bright); border-right: 1px solid var(--green-bright); }
  </style>
</head>
<body>
  <div class="card">
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <div class="check-wrap">
      <div class="check-ring">
        <svg class="check-svg" viewBox="0 0 36 36">
          <polyline class="check-path" points="7,19 15,27 29,11"/>
        </svg>
      </div>
      <div class="orbit">
        <div class="orbit-dot"></div>
      </div>
    </div>

    <h1 class="headline">All <em>done.</em></h1>
    <p class="subtitle">Your action was completed successfully. Everything looks good on our end.</p>

    <div class="divider"></div>

    <div class="meta">
      <div class="meta-dot"></div>
      Status confirmed
    </div>
  </div>
</body>
</html>
